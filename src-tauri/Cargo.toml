[package]
name = "hackt"
version = "1.0.0"
description = "HackT Sovereign Agent"
authors = ["Operator"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "1.5", features = [] }

[dependencies]
tauri = { version = "1.5", features = [ "shell-sidecar", "shell-open", "window-set-always-on-top", "window-hide", "protocol-asset", "window-show", "system-tray"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.33", features = ["full"] }
# FIXED: Added 'stream' for the first-run setup model downloader
reqwest = { version = "0.11", features = ["json", "blocking", "stream"] }
futures-util = "0.3" 
tauri-plugin-deep-link = "0.1"
uuid = { version = "1.4", features = ["v4"] }

[target.'cfg(target_os = "windows")'.dependencies]
wmi = "0.13"
# FIXED: Added windows crate for permissions.rs COM initialization
windows = { version = "0.48", features = ["Win32_System_Com"] }
[package]
name = "hackt"
version = "1.0.0"
description = "HackT Sovereign Agent"
authors = ["Operator"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "1.5", features = [] }

[dependencies]
tauri = { version = "1.5", features = [
    "custom-protocol",   # ✅ REQUIRED – does NOT need admin
    "dialog-all",
    "app-all",
    "fs-all",
    "shell-open",
    "system-tray"
] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.33", features = ["full"] }
reqwest = { version = "0.11", features = ["json"] }
uuid = { version = "1.4", features = ["v4"] }

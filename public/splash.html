<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>
  <style>
    body {
      background-color: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    img {
      width: 200px;
      height: 200px;
      animation: pulse 2s infinite ease-in-out;
      filter: drop-shadow(0 0 20px rgba(0, 243, 255, 0.5)); /* Cyberpunk glow */
    }
    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(0.95); opacity: 0.8; }
    }
  </style>
</head>
<body>
  <img src="/app-icon.png" alt="HackT Logo">
</body>
</html>
